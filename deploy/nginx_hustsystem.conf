# ============================================================
# Nginx 生产配置：反向代理 + 安全头 + IP 限流 + WebSocket
# 阶段二（单实例模式：仅 8501 端口）
# ============================================================
#
# 部署步骤：
#   1. sudo cp nginx_hustsystem.conf /etc/nginx/conf.d/hustsystem.conf
#   2. sudo nginx -t          # 测试配置无误
#   3. sudo systemctl reload nginx
#
# 如果使用 HTTPS（推荐），取消注释下方 SSL 配置段。

# IP 级请求限流（防暴力破解 + 轻度 DDoS）
# 每个 IP 每秒 5 次请求，突发最多 30 次（排队处理）
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=5r/s;

# ── 单实例模式 upstream ──
upstream streamlit_backend {
    server 127.0.0.1:8501;
    # 多实例模式时取消下方注释并启用 ip_hash
    # ip_hash;
    # server 127.0.0.1:8502 max_fails=2 fail_timeout=30s;
    # server 127.0.0.1:8503 max_fails=2 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    # ── HTTPS 配置（使用 certbot 或阿里云免费证书后取消注释） ──
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/你的域名/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/你的域名/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── 安全响应头（解决 R3 点击劫持等风险） ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 上传大小限制 ──
    client_max_body_size 15M;

    # ── 应用反向代理 ──
    location / {
        # 应用 IP 限流
        limit_req zone=global_limit burst=30 nodelay;

        proxy_pass http://streamlit_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（Streamlit 必需）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_read_timeout 86400;
    }
}
