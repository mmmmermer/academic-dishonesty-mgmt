# Nginx example: reverse proxy to multiple Streamlit workers + session affinity + WebSocket.
# Customize paths, ports, server_name. See docs/阶段三实施说明.md

upstream streamlit_backends {
    ip_hash;
    server 127.0.0.1:8501 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:8502 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:8503 max_fails=2 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    location / {
        proxy_pass http://streamlit_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_read_timeout 86400;
    }
}
